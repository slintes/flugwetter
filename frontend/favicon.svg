<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#3a7bd5"/>
      <stop offset="100%" stop-color="#74b9ff"/>
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="130%" height="130%">
      <feDropShadow dx="0" dy="1" stdDeviation="1.5" flood-color="#1a4a7a" flood-opacity="0.3"/>
    </filter>
    <filter id="planeShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="1" dy="2" stdDeviation="1.5" flood-color="#0a2540" flood-opacity="0.4"/>
    </filter>
  </defs>

  <!-- Background rounded square -->
  <rect x="2" y="2" width="60" height="60" rx="14" fill="url(#sky)"/>

  <!-- Sun in top right corner -->
  <circle cx="52" cy="14" r="7" fill="#ffd93d" opacity="0.9"/>
  <g stroke="#ffd93d" stroke-width="1.5" stroke-linecap="round" opacity="0.7">
    <line x1="52" y1="4" x2="52" y2="6"/>
    <line x1="52" y1="22" x2="52" y2="24"/>
    <line x1="42" y1="14" x2="44" y2="14"/>
    <line x1="60" y1="14" x2="62" y2="14"/>
    <line x1="45" y1="7" x2="46.5" y2="8.5"/>
    <line x1="57.5" y1="19.5" x2="59" y2="21"/>
    <line x1="45" y1="21" x2="46.5" y2="19.5"/>
    <line x1="57.5" y1="8.5" x2="59" y2="7"/>
  </g>

  <!-- Cloud -->
  <g fill="white" opacity="0.85" filter="url(#shadow)">
    <ellipse cx="32" cy="48" rx="18" ry="7"/>
    <circle cx="22" cy="42" r="9"/>
    <circle cx="34" cy="39" r="11"/>
    <circle cx="44" cy="44" r="7"/>
  </g>

  <!-- Airplane - side view, flying right -->
  <g transform="translate(4,18) scale(1.15)" filter="url(#planeShadow)">
    <!-- Fuselage - thick cigar shape -->
    <path d="
      M 6,14
      Q 2,14 2,12.5
      Q 2,11 6,11
      L 36,10
      Q 42,10.5 42,12.5
      Q 42,14.5 36,15
      Z
    " fill="#1a2a44"/>

    <!-- Main wing - swept backward, thick and long -->
    <path d="
      M 27,10.5
      L 17,1
      Q 16,0 18,0
      L 25,2
      L 31,10.5
    " fill="#1a2a44"/>
    <path d="
      M 27,14.5
      L 17,24.5
      Q 16,25.5 18,25.5
      L 25,23.5
      L 31,14.5
    " fill="#1a2a44"/>

    <!-- Tail wings - same shape as main wings, half size -->
    <path d="
      M 8,11
      L 3,6.5
      Q 2.5,6 3.5,6
      L 7,7
      L 10,11
    " fill="#1a2a44"/>
    <path d="
      M 8,14
      L 3,18.5
      Q 2.5,19 3.5,19
      L 7,18
      L 10,14
    " fill="#1a2a44"/>

    <!-- Cockpit window -->
    <ellipse cx="38" cy="12.5" rx="2" ry="1.3" fill="#5bc0eb" opacity="0.8"/>
  </g>
</svg>
