<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flugwetter - Aviation Weather Forecast</title>
    <link rel="icon" type="image/svg+xml" href="static/favicon.svg">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-adapter-date-fns/dist/chartjs-adapter-date-fns.bundle.min.js"></script>

    <link rel="stylesheet" href="static/styles.css">
</head>
<body>
    <div class="container">
        <header>
            <h2><img src="static/favicon.svg" alt="" style="height: 1.2em; vertical-align: middle; margin-right: 0.3em;">Flugwetter EDDG / FMO</h2>
        </header>

        <main>
            <div class="chart-instructions">
                <span class="desktop-hint">Ctrl + scroll to zoom, drag to pan</span><span class="mobile-hint">Swipe to pan, pinch to zoom</span>
                <button onclick="resetZoom(6)">6h</button>
                <button onclick="resetZoom(12)">12h</button>
                <button onclick="resetZoom(24)">24h</button>
                <button onclick="resetZoom(48)">48h</button>
                <button onclick="resetZoom(72)">72h</button>
                <button onclick="resetZoom(undefined)">All</button>
            </div>

            <div class="charts-grid">
                <div class="chart-container vfr-container">
                    <h2>VFR probability</h2>
                    <canvas id="vfrChart"></canvas>
                </div>
                
                <div class="chart-container">
                    <h2>Temperature, Dew Point & Precipitation</h2>
                    <canvas id="temperatureChart"></canvas>
                </div>

                <div class="chart-container">
                    <h2>Clouds & Visibility</h2>
                    <canvas id="cloudChart"></canvas>
                </div>

                <div class="chart-container">
                    <h2>Wind</h2>
                    <canvas id="windChart"></canvas>
                </div>
            </div>

            <div class="loading" id="loading">
                <p>Loading weather data...</p>
            </div>

            <div class="error" id="error" style="display: none;">
                <p>Failed to load weather data. Please try again later.</p>
                <button onclick="loadWeatherData()">Retry</button>
            </div>

        </main>
    </div>

    <script src="static/weather-icons.js"></script>
    <script src="static/app.js"></script>
</body>
</html>
